name: Arteq Daily Scrape

on:
  schedule:
    # 06:00 UTC = 07:00 CET / 14:00 SGT
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Just scrape, skip Sheets write'
        required: false
        default: 'false'

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests beautifulsoup4 gspread google-auth

      - name: Write Google credentials
        run: echo '${{ secrets.GOOGLE_CREDENTIALS }}' > credentials.json

      - name: Run scraper
        env:
          JSEARCH_API_KEY: ${{ secrets.JSEARCH_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python quick_run.py

      - name: Upload CSV backup
        uses: actions/upload-artifact@v4
        with:
          name: leads-${{ github.run_number }}
          path: leads_*.csv
          retention-days: 30
          