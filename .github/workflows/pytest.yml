name: Tests

on:
  push:
    branches: [main]
    paths:
      - '**.py'
      - 'tests/**'
      - 'requirements*.txt'
      - 'pytest.ini'
  pull_request:
    branches: [main]
    paths:
      - '**.py'
      - 'tests/**'
      - 'requirements*.txt'
      - 'pytest.ini'

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -r requirements-test.txt

      - name: Run unit tests
        run: PYTHONPATH=. pytest -m unit -v --tb=short

      - name: Run integration tests
        run: PYTHONPATH=. pytest -m integration -v --tb=short

      - name: Run E2E tests
        run: PYTHONPATH=. pytest -m e2e -v --tb=short

      - name: Coverage report
        run: PYTHONPATH=. pytest --cov=. --cov-report=term-missing --cov-report=html -q
        continue-on-error: true
